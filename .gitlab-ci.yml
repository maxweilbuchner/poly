stages:
  - check
  - test
  - build
  - release

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  RUSTFLAGS: "-D warnings"
  PKG_REGISTRY: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/poly"

# Cache Cargo registry + build artifacts between jobs and pipelines.
.rust-cache: &rust-cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/registry/index
      - .cargo/registry/cache
      - target/

# ── Check stage ───────────────────────────────────────────────────────────────

fmt:
  stage: check
  image: rust:1.88
  <<: *rust-cache
  script:
    - rustup component add rustfmt
    - cargo fmt -- --check

clippy:
  stage: check
  image: rust:1.88
  <<: *rust-cache
  script:
    - rustup component add clippy
    - cargo clippy --all-targets -- -D warnings -A clippy::uninlined_format_args

# ── Test stage ────────────────────────────────────────────────────────────────

test:
  stage: test
  image: rust:1.88
  <<: *rust-cache
  script:
    - cargo test --all-targets

# ── Build stage ───────────────────────────────────────────────────────────────
#
# On tagged commits each build job uploads its binary to the GitLab Generic
# Package Registry so the release job can link to stable download URLs.

build-linux:
  stage: build
  image: rust:1.88
  <<: *rust-cache
  script:
    - cargo build --release
    - strip target/release/poly
    - ./target/release/poly --version
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file target/release/poly \
             "${PKG_REGISTRY}/${CI_COMMIT_TAG}/poly-linux-x86_64"
      fi
  artifacts:
    paths:
      - target/release/poly
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build-macos-arm:
  stage: build
  tags:
    - saas-macos-medium-m2
  script:
    - cargo build --release
    - strip target/release/poly
    - mv target/release/poly target/release/poly-macos-aarch64
    - ./target/release/poly-macos-aarch64 --version
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file target/release/poly-macos-aarch64 \
             "${PKG_REGISTRY}/${CI_COMMIT_TAG}/poly-macos-aarch64"
      fi
  artifacts:
    paths:
      - target/release/poly-macos-aarch64
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build-macos-x86:
  stage: build
  tags:
    - saas-macos-medium-m2
  script:
    - rustup target add x86_64-apple-darwin
    - cargo build --release --target x86_64-apple-darwin
    - strip target/x86_64-apple-darwin/release/poly
    - mv target/x86_64-apple-darwin/release/poly target/release/poly-macos-x86_64
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file target/release/poly-macos-x86_64 \
             "${PKG_REGISTRY}/${CI_COMMIT_TAG}/poly-macos-x86_64"
      fi
  artifacts:
    paths:
      - target/release/poly-macos-x86_64
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Release stage (tagged commits only) ──────────────────────────────────────
#
# Asset links point to the Generic Package Registry URLs uploaded by the build
# jobs above — not to job artifacts (which use ephemeral job IDs).

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build-linux
      artifacts: false
    - job: build-macos-arm
      artifacts: false
      optional: true
    - job: build-macos-x86
      artifacts: false
      optional: true
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: ${CI_COMMIT_TAG}
    name: "poly ${CI_COMMIT_TAG}"
    description: "Release ${CI_COMMIT_TAG}"
    assets:
      links:
        - name: "poly-linux-x86_64"
          url: "${PKG_REGISTRY}/${CI_COMMIT_TAG}/poly-linux-x86_64"
        - name: "poly-macos-aarch64"
          url: "${PKG_REGISTRY}/${CI_COMMIT_TAG}/poly-macos-aarch64"
        - name: "poly-macos-x86_64"
          url: "${PKG_REGISTRY}/${CI_COMMIT_TAG}/poly-macos-x86_64"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
