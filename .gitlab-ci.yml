stages:
  - check
  - test
  - build
  - release

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  RUSTFLAGS: "-D warnings"

# Cache Cargo registry + build artifacts between jobs and pipelines.
.rust-cache: &rust-cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/registry/index
      - .cargo/registry/cache
      - target/

# ── Check stage ───────────────────────────────────────────────────────────────

fmt:
  stage: check
  image: rust:1.82
  <<: *rust-cache
  script:
    - rustup component add rustfmt
    - cargo fmt -- --check

clippy:
  stage: check
  image: rust:1.82
  <<: *rust-cache
  script:
    - rustup component add clippy
    - cargo clippy --all-targets -- -D warnings

# ── Test stage ────────────────────────────────────────────────────────────────

test:
  stage: test
  image: rust:1.82
  <<: *rust-cache
  script:
    - cargo test --all-targets

# ── Build stage ───────────────────────────────────────────────────────────────

build-linux:
  stage: build
  image: rust:1.82
  <<: *rust-cache
  script:
    - cargo build --release
    - strip target/release/poly
  artifacts:
    paths:
      - target/release/poly
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Release stage (tagged commits only) ──────────────────────────────────────

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build-linux
      artifacts: true
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: ${CI_COMMIT_TAG}
    name: "poly ${CI_COMMIT_TAG}"
    description: "Release ${CI_COMMIT_TAG}"
    assets:
      links:
        - name: "poly-linux-x86_64"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/target/release/poly"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
